<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1e293b" stroke-width="24"/>
  <!-- Green progress arc (~75%) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#22c55e" stroke-width="24"
    stroke-linecap="round"
    stroke-dasharray="848 1131"
    stroke-dashoffset="283"
    transform="rotate(-90 256 256)"/>
  <!-- Inner content: bold calorie number style -->
  <text x="256" y="232" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
    font-size="96" font-weight="800" fill="#f1f5f9" text-anchor="middle">CAL</text>
  <!-- Green underline bar -->
  <rect x="156" y="258" width="200" height="8" rx="4" fill="#22c55e"/>
  <!-- Macro dots -->
  <circle cx="196" cy="316" r="12" fill="#60a5fa"/>
  <circle cx="256" cy="316" r="12" fill="#fbbf24"/>
  <circle cx="316" cy="316" r="12" fill="#fb923c"/>
</svg>
